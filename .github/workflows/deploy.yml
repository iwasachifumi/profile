name: Deploy to production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 163.43.131.43
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            set -e
            cd /var/www/profile
            git pull origin main
            # DB マイグレーション (冪等なので毎回実行しても安全)
            docker exec -i supabase-db psql -U postgres \
              < /var/www/profile/memoria-next/db/migrations/0004_fix_auth_fk.sql
            cd /var/www/profile/memoria-next
            npm install --prefer-offline
            rm -rf .next
            npm run build
            pm2 startOrRestart pm2.config.js --env production
            pm2 save
