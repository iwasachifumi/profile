# /etc/nginx/sites-available/memoria
# 既存の onestep vhost とは別ファイル。他の vhost には触れない。

server {
    listen 80;
    server_name profile.ac7.co.jp;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name profile.ac7.co.jp;

    ssl_certificate     /etc/letsencrypt/live/profile.ac7.co.jp/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/profile.ac7.co.jp/privkey.pem;

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
